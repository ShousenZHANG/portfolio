<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Eddy Zhang</title>
    <meta name="description" content="Page not found." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0e0e10" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(56,189,248,0.06) 0%, transparent 60%), #0a0a0c;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .wrap { max-width: 520px; text-align: center; }
      .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 14px;
        background: linear-gradient(135deg, #38bdf8, #22d3ee, #34d399);
        color: #0e0e10;
        font-weight: 900;
        font-size: 32px;
        letter-spacing: -1px;
        margin-bottom: 28px;
      }
      .code {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: rgba(255,255,255,0.55);
        margin-bottom: 12px;
      }
      h1 {
        font-size: clamp(40px, 8vw, 64px);
        font-weight: 800;
        letter-spacing: -2px;
        line-height: 1.1;
        margin-bottom: 16px;
      }
      h1 .accent {
        background: linear-gradient(90deg, #38bdf8, #22d3ee, #34d399);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: rgba(255,255,255,0.7);
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .home {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 12px;
        background: linear-gradient(135deg, #38bdf8, #22d3ee, #34d399);
        color: #0e0e10;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .home:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(56,189,248,0.4); }
      .home:focus-visible { outline: 2px solid #38bdf8; outline-offset: 4px; }
      .home svg { width: 16px; height: 16px; }
      @media (prefers-reduced-motion: reduce) {
        .home { transition: none; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="mark" aria-hidden="true">E</div>
      <p class="code">Error 404</p>
      <h1>This page <span class="accent">went missing</span></h1>
      <p>The link you followed may be broken, or the page may have been moved.</p>
      <a class="home" href="/">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12.5 8H3.5"/><path d="M7.5 4 3.5 8l4 4"/>
        </svg>
        Back to portfolio
      </a>
    </main>
  </body>
</html>
