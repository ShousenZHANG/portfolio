<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Eddy Zhang</title>
    <meta name="description" content="Page not found." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0e0e10" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(124,92,255,0.08) 0%, transparent 60%), #0a0a0c;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .wrap { max-width: 520px; text-align: center; }
      .mark {
        display: block;
        width: 64px;
        height: 64px;
        margin: 0 auto 28px;
      }
      .code {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: rgba(255,255,255,0.55);
        margin-bottom: 12px;
      }
      h1 {
        font-size: clamp(40px, 8vw, 64px);
        font-weight: 800;
        letter-spacing: -2px;
        line-height: 1.1;
        margin-bottom: 16px;
      }
      h1 .accent {
        background: linear-gradient(90deg, #7C5CFF, #38C6E8);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: rgba(255,255,255,0.7);
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .home {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 12px;
        background: linear-gradient(135deg, #7C5CFF, #38C6E8);
        color: #0e0e10;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .home:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(56,189,248,0.4); }
      .home:focus-visible { outline: 2px solid #7C5CFF; outline-offset: 4px; }
      .home svg { width: 16px; height: 16px; }
      @media (prefers-reduced-motion: reduce) {
        .home { transition: none; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <svg class="mark" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="g404" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#7C5CFF"/><stop offset="1" stop-color="#38C6E8"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="15" fill="url(#g404)"/>
        <g fill="#14111E">
          <rect x="18" y="17" width="6.5" height="30" rx="3.25"/>
          <rect x="18" y="17" width="27" height="6.5" rx="3.25"/>
          <rect x="18" y="28.75" width="18" height="6.5" rx="3.25"/>
          <rect x="18" y="40.5" width="27" height="6.5" rx="3.25"/>
        </g>
        <circle cx="42.5" cy="32" r="3.6" fill="#14111E"/>
      </svg>
      <p class="code">Error 404</p>
      <h1>This page <span class="accent">went missing</span></h1>
      <p>The link you followed may be broken, or the page may have been moved.</p>
      <a class="home" href="/">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12.5 8H3.5"/><path d="M7.5 4 3.5 8l4 4"/>
        </svg>
        Back to portfolio
      </a>
    </main>
  </body>
</html>
